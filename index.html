<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agenda Pro 2026 - Ultra Stable</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #f0f2f5; --p: #1a237e; --r: #2196f3; --a: #4caf50; --d: #ff9800; --v: #fbc02d; --festivo: #d32f2f; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; }
        .header { background: var(--p); color: white; padding: 15px 10px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .nav-buttons { display: flex; justify-content: center; gap: 5px; margin-top: 10px; }
        .nav-btn { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; }
        #monthPicker { background: white; border: 2px solid var(--r); padding: 10px; border-radius: 8px; font-weight: bold; color: var(--p); font-size: 18px; width: 85%; }
        
        .calendar-strip { display: flex; overflow-x: auto; padding: 15px 10px; background: white; border-bottom: 1px solid #ddd; gap: 10px; }
        .day-item { min-width: 55px; height: 65px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; border: 1px solid #eee; cursor: pointer; flex-shrink: 0; background: #fff; }
        .day-item.holiday { background: var(--festivo); color: white; }
        .day-item.active { background: var(--r) !important; color: white !important; transform: scale(1.05); }

        .day-title-container { padding: 10px; background: #fff; }
        .day-title-input { width: 100%; border: 2px dashed #ccc; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; text-align: center; background: #fffbe6; box-sizing: border-box; }

        .content { padding: 10px; padding-bottom: 100px; }
        .slot { background: white; margin-bottom: 12px; padding: 12px; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); border-left: 10px solid #ddd; }
        .slot-main { display: flex; gap: 10px; }
        .ora-input { width: 75px; border: none; font-weight: bold; color: var(--p); background: #f0f4f8; padding: 8px; border-radius: 6px; text-align: center; }
        .nota-input { flex: 1; border: none; font-size: 16px; padding: 10px; background: #f8f9fa; border-radius: 8px; resize: none; min-height: 40px; }

        .dots { display: flex; gap: 8px; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        .dot { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; font-size: 12px; font-weight: bold; }

        #vistaMese { display: none; padding: 5px; }
        .grid-mese { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: #ccc; }
        .cell-mese { background: white; min-height: 90px; padding: 4px; cursor: pointer; font-size: 12px; }
        .mese-title-tag { background: #fff9c4; color: #827717; font-size: 8px; padding: 2px; border-radius: 2px; margin-bottom: 2px; border: 1px solid #fbc02d; overflow: hidden; }
        .mese-app-tag { color: white; padding: 1px 2px; font-size: 8px; border-radius: 2px; margin-bottom: 1px; }

        .floating-tools { position: fixed; bottom: 20px; right: 20px; }
        .tool-btn { width: 55px; height: 55px; border-radius: 50%; border: none; color: white; font-size: 30px; background: var(--a); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #modalAdd { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 5000; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 85%; padding: 20px; border-radius: 20px; }
    </style>
</head>
<body>

<div class="header">
    <select id="monthPicker" onchange="initCalendar()"></select>
    <div class="nav-buttons">
        <button class="nav-btn" onclick="switchView('giorno')">GIORNO</button>
        <button class="nav-btn" onclick="switchView('mese')">MESE</button>
        <button class="nav-btn" onclick="ripristinaBase()" style="background: var(--r);">ORE BASE</button>
        <button class="nav-btn" onclick="resetOrari()" style="background: #f44336;">RESET</button>
    </div>
</div>

<div id="vistaGiorno">
    <div class="calendar-strip" id="calendarStrip"></div>
    <div class="day-title-container">
        <input type="text" id="dayTitleInput" class="day-title-input" placeholder="TITOLO GIORNATA" oninput="salvaTitolo(this.value)">
    </div>
    <div class="content" id="gridOraria"></div>
</div>

<div id="vistaMese"><div class="grid-mese" id="gridMese"></div></div>

<div class="floating-tools"><button class="tool-btn" onclick="openModal()">+</button></div>

<div id="modalAdd">
    <div class="modal-content">
        <h3>Nuovo Orario</h3>
        <input type="time" id="newOra" value="09:00">
        <textarea id="newTesto" rows="2" style="width:100%; margin:10px 0;" placeholder="Note..."></textarea>
        <button onclick="salvaDalModal()" style="width:100%; padding:12px; background:var(--a); color:white; border:none; border-radius:8px;">AGGIUNGI</button>
        <button onclick="closeModal()" style="width:100%; padding:10px; margin-top:5px; background:#999; color:white; border:none; border-radius:8px;">CHIUDI</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        databaseURL: "https://agenda-2026-eceb7-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "agenda-2026-eceb7",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let selectedDate = "";
    let saveTimeout = null;
    const oreBase = ["09:00","09:30","10:00","10:30","11:00","11:30","12:00","12:30","13:00","16:30","17:00","17:30","18:00","18:30","19:00","19:30","20:00"];
    const colMap = { ric:['#2196f3','R'], a:['#4caf50','A'], d:['#ff9800','D'], v:['#fbc02d','V','#333'], def:['#ddd',''] };

    function initCalendar() {
        const mp = document.getElementById('monthPicker');
        if(mp.options.length === 0) {
            const mNames = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
            for(let i=0; i<12; i++) {
                let opt = new Option(mNames[i] + " 2026", `2026-${String(i+1).padStart(2,'0')}`);
                if(i === new Date().getMonth()) opt.selected = true;
                mp.add(opt);
            }
        }
        const [y, m] = mp.value.split('-').map(Number);
        const strip = document.getElementById('calendarStrip'); strip.innerHTML = "";
        const lastDay = new Date(y, m, 0).getDate();
        for (let i = 1; i <= lastDay; i++) {
            const ds = `${y}-${String(m).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const el = document.createElement('div'); el.className = `day-item ${new Date(ds).getDay()===0?'holiday':''}`; el.id = "day-"+ds;
            el.innerHTML = `<span>${["Dom","Lun","Mar","Mer","Gio","Ven","Sab"][new Date(ds).getDay()]}</span><b>${i}</b>`;
            el.onclick = () => selectDay(ds);
            strip.appendChild(el);
        }
        let oggi = new Date().toISOString().split('T')[0];
        selectDay(selectedDate || (oggi.includes(mp.value) ? oggi : `${y}-${String(m).padStart(2,'0')}-01`));
        renderMese(y, m);
    }

    function selectDay(dStr) {
        selectedDate = dStr;
        document.querySelectorAll('.day-item').forEach(d => d.classList.remove('active'));
        if(document.getElementById("day-"+dStr)) document.getElementById("day-"+dStr).classList.add('active');

        db.ref('titoli/' + dStr).once('value', s => { document.getElementById('dayTitleInput').value = s.val() || ""; });

        db.ref('agenda/' + dStr).once('value', snap => {
            const dati = snap.val() || {};
            const grid = document.getElementById('gridOraria');
            grid.innerHTML = "";
            
            let mappa = {};
            // Creazione righi base con ID statici puliti
            oreBase.forEach(o => { 
                let cleanID = "id_" + o.replace(":", "");
                mappa[cleanID] = {h:o, t:"", c:"def", id:cleanID}; 
            });
            // Sovrapposizione dati salvati (solo se hanno un orario valido)
            Object.keys(dati).forEach(k => { 
                if(dati[k].h) mappa[k] = {...dati[k], id:k}; 
            });

            Object.values(mappa).sort((a,b)=>a.h.localeCompare(b.h)).forEach(v => {
                const c = colMap[v.c] || colMap.def;
                grid.innerHTML += `
                <div class="slot" style="border-left-color:${c[0]}" id="slot-${v.id}">
                    <div class="slot-main">
                        <input type="text" class="ora-input" value="${v.h}" oninput="debounceSave('${v.id}', this.value, null)">
                        <textarea class="nota-input" oninput="debounceSave('${v.id}', null, this.value)">${v.t}</textarea>
                    </div>
                    <div class="dots">
                        ${Object.entries(colMap).filter(x=>x[0]!='def').map(([key,val])=>`
                            <div class="dot" style="background:${val[0]}" onclick="cambiaColore('${v.id}','${key}')">${val[1]}</div>
                        `).join('')}
                        <div class="dot" style="background:#eee;color:#999" onclick="elimina('${v.id}')">×</div>
                    </div>
                </div>`;
            });
        });
    }

    function debounceSave(id, ora, testo) {
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => {
            const ref = db.ref('agenda/' + selectedDate + '/' + id);
            ref.once('value').then(s => {
                const d = s.val() || { h: "", t: "", c: "def" };
                ref.update({
                    h: ora !== null ? ora : d.h,
                    t: testo !== null ? testo : d.t,
                    c: d.c
                });
            });
        }, 1000); // Salva dopo 1 secondo di inattività
    }

    function cambiaColore(id, colore_key) {
        db.ref('agenda/' + selectedDate + '/' + id).update({ c: colore_key }).then(() => {
            document.getElementById('slot-'+id).style.borderLeftColor = colMap[colore_key][0];
        });
    }

    function salvaTitolo(v) {
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => { db.ref('titoli/' + selectedDate).set(v); }, 1000);
    }

    function renderMese(y, m) {
        const gm = document.getElementById('gridMese'); gm.innerHTML = "";
        for (let i = 1; i <= new Date(y, m, 0).getDate(); i++) {
            const ds = `${y}-${String(m).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const cell = document.createElement('div'); cell.className = 'cell-mese';
            cell.innerHTML = `<b>${i}</b><div id="tm-${ds}"></div><div id="am-${ds}"></div>`;
            cell.onclick = () => { switchView('giorno'); selectDay(ds); };
            gm.appendChild(cell);
            db.ref('titoli/'+ds).on('value', s => { if(document.getElementById("tm-"+ds)) document.getElementById("tm-"+ds).innerHTML = s.val() ? `<div class="mese-title-tag">${s.val()}</div>` : ""; });
            db.ref('agenda/'+ds).on('value', s => { 
                const d = s.val() || {};
                const div = document.getElementById("am-"+ds);
                if(div) div.innerHTML = Object.values(d).filter(x=>x.t).map(x=>`<div class="mese-app-tag" style="background:${colMap[x.c][0]}">${x.t.substring(0,8)}</div>`).join('');
            });
        }
    }

    function switchView(v) { 
        document.getElementById('vistaGiorno').style.display = v==='giorno'?'block':'none'; 
        document.getElementById('vistaMese').style.display = v==='mese'?'block':'none'; 
    }
    
    function openModal() { document.getElementById('modalAdd').style.display='flex'; }
    function closeModal() { document.getElementById('modalAdd').style.display='none'; }

    function salvaDalModal() {
        const id = "custom_" + Date.now();
        const h = document.getElementById('newOra').value;
        const t = document.getElementById('newTesto').value;
        if(!h) return alert("Inserisci un orario");
        db.ref('agenda/'+selectedDate+'/'+id).set({ h: h, t: t, c: 'def' }).then(() => {
            closeModal(); selectDay(selectedDate);
        });
    }

    function elimina(id) { if(confirm("Eliminare questo rigo?")) { db.ref('agenda/'+selectedDate+'/'+id).remove().then(() => selectDay(selectedDate)); } }
    function resetOrari() { if(confirm("Cancellare TUTTO il giorno?")) { db.ref('agenda/'+selectedDate).remove(); db.ref('titoli/'+selectedDate).remove(); selectDay(selectedDate); } }
    function ripristinaBase() { 
        if(confirm("Ripristinare gli orari standard?")) { 
            const obj = {}; 
            oreBase.forEach(o => { let id = "id_" + o.replace(":",""); obj[id] = {h:o, t:"", c:"def"}; });
            db.ref('agenda/'+selectedDate).set(obj).then(() => selectDay(selectedDate));
        } 
    }
    window.onload = initCalendar;
</script>
</body>
</html>
