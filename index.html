<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agenda Pro 2026 - Finale Stabile</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --p: #1a237e; --r: #2196f3; --a: #4caf50; --festivo: #d32f2f; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; }
        
        .header { background: var(--p); color: white; padding: 10px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .nav-buttons { display: flex; justify-content: center; gap: 5px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
        .nav-btn { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 10px; font-weight: bold; }
        
        .master-switch { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 20px; border: 1px solid white; font-size: 10px; }
        .switch { position: relative; width: 30px; height: 16px; display: inline-block; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; border-radius: 20px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 10px; width: 10px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: var(--a); }
        input:checked + .slider:before { transform: translateX(14px); }

        .calendar-strip { display: flex; overflow-x: auto; padding: 15px 10px; background: white; gap: 8px; border-bottom: 1px solid #ddd; scroll-behavior: smooth; }
        .day-item { min-width: 55px; padding: 10px 5px; border-radius: 10px; border: 1px solid #eee; text-align: center; cursor: pointer; background: white; flex-shrink: 0; }
        .day-item.active { background: var(--r) !important; color: white !important; border-color: var(--r); }
        /* Festivi: Sfondo rosso, scritta bianca */
        .day-item.holiday { background: var(--festivo); color: white; border-color: var(--festivo); }

        .content { padding: 10px; padding-bottom: 90px; }
        .day-title { width: 100%; padding: 15px; border: none; background: #fffbe6; font-weight: bold; text-align: center; box-sizing: border-box; font-size: 16px; border-bottom: 2px solid #ffe082; }
        
        .slot { background: white; margin-bottom: 10px; padding: 12px; border-radius: 12px; border-left: 10px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .slot-main { display: flex; gap: 10px; }
        .ora-input { width: 85px; border: 1px solid #eee; border-radius: 6px; padding: 8px; font-weight: bold; text-align: center; background: #f8f9fa; color: var(--p); }
        .nota-input { flex: 1; border: 1px solid #eee; border-radius: 6px; padding: 8px; font-size: 15px; min-height: 40px; }
        
        .grid-mese { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: #ccc; border: 2px solid #ccc; }
        .header-mese { background: #eee; text-align: center; font-size: 10px; padding: 5px; font-weight: bold; }
        .cell-mese { background: white; min-height: 100px; padding: 4px; position: relative; cursor: pointer; }
        .cell-mese.holiday { background: var(--festivo); color: white; }
        .cell-mese.holiday b { color: white; }
        .btn-del-mese { position: absolute; top: 2px; right: 2px; color: white; background: rgba(0,0,0,0.2); border: none; border-radius: 4px; padding: 2px; cursor: pointer; }

        #modalAdd { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
        .modal-box { background: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 15px; }
        .btn-block { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <select id="monthPicker" onchange="initCalendar()" style="width:80%; padding:8px; border-radius:8px; margin-bottom:10px;"></select>
    <div class="nav-buttons">
        <button class="nav-btn" onclick="toggleVista('giorno')">GIORNO</button>
        <button class="nav-btn" onclick="toggleVista('mese')">MESE</button>
        <div class="master-switch">
            ORARI <label class="switch"><input type="checkbox" id="baseToggle" onchange="setSwitch(this.checked)"><span class="slider"></span></label>
        </div>
        <button class="nav-btn" style="background:var(--festivo); border:none;" onclick="pulisciTestiGiorno()">RESET</button>
    </div>
</div>

<div id="vistaGiorno">
    <div class="calendar-strip" id="strip"></div>
    <input type="text" id="dayTitle" class="day-title" placeholder="TITOLO GIORNATA" onblur="salvaTitolo(this.value)">
    <div class="content" id="grid"></div>
</div>

<div id="vistaMese" style="display:none;"><div class="grid-mese" id="gridMese"></div></div>

<div style="position:fixed; bottom:20px; right:20px; z-index:1001;"><button onclick="openModal()" style="width:60px; height:60px; border-radius:50%; background:var(--a); color:white; border:none; font-size:30px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">+</button></div>

<div id="modalAdd">
    <div class="modal-box">
        <h3>Nuovo Appuntamento</h3>
        <input type="time" id="mInizio" value="09:00"> a <input type="time" id="mFine" value="10:00">
        <textarea id="mTesto" rows="4" style="width:100%; margin:15px 0; padding:10px;" placeholder="Dettagli..."></textarea>
        <button class="btn-block" style="background:var(--a); color:white" onclick="salvaModal()">SALVA</button>
        <button class="btn-block" style="background:var(--festivo); color:white" onclick="resetInteroGiorno()">ELIMINA TUTTO</button>
        <button class="btn-block" style="background:#eee" onclick="closeModal()">CHIUDI</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://agenda-2026-eceb7-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentDay = "";
    let localCache = {};
    const oreBase = ["09:00","09:30","10:00","10:30","11:00","11:30","12:00","12:30","13:00","16:30","17:00","17:30","18:00","18:30","19:00","19:30","20:00"];
    const colMap = { ric:['#2196f3','R'], a:['#4caf50','A'], d:['#ff9800','D'], v:['#fbc02d','V'], def:['#ddd',''] };

    // Carica stato Switch
    const savedSwitch = localStorage.getItem('agendaOrari') === 'true';
    document.getElementById('baseToggle').checked = savedSwitch;

    function initCalendar() {
        const mp = document.getElementById('monthPicker');
        if(!mp.options.length) {
            ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"].forEach((m, i) => mp.add(new Option(m + " 2026", `2026-${String(i+1).padStart(2,'0')}`)));
            mp.value = `2026-${String(new Date().getMonth()+1).padStart(2,'0')}`;
        }
        
        const [y, m] = mp.value.split('-').map(Number);
        const strip = document.getElementById('strip'); strip.innerHTML = "";
        const gm = document.getElementById('gridMese'); gm.innerHTML = "";

        ["Lun","Mar","Mer","Gio","Ven","Sab","Dom"].forEach(g => gm.innerHTML += `<div class="header-mese">${g}</div>`);
        let firstPos = new Date(y, m-1, 1).getDay();
        if(firstPos === 0) firstPos = 7;
        for(let s=1; s<firstPos; s++) gm.innerHTML += `<div class="cell-mese" style="background:#f9f9f9"></div>`;

        for(let d=1; d<=new Date(y, m, 0).getDate(); d++) {
            const ds = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isSun = new Date(ds).getDay() === 0;

            const di = document.createElement('div'); di.className = `day-item ${isSun?'holiday':''}`; di.id = "s-"+ds;
            di.innerHTML = `<small>${["Dom","Lun","Mar","Mer","Gio","Ven","Sab"][new Date(ds).getDay()]}</small><br><b>${d}</b>`;
            di.onclick = () => selectDay(ds);
            strip.appendChild(di);

            const cell = document.createElement('div'); cell.className = `cell-mese ${isSun?'holiday':''}`;
            cell.innerHTML = `<b>${d}</b><button class="btn-del-mese" onclick="event.stopPropagation(); svuotaGiorno('${ds}')">🗑️</button><div id="mt-${ds}" style="font-size:9px; font-weight:bold;"></div><div id="mb-${ds}"></div>`;
            cell.onclick = () => { toggleVista('giorno'); selectDay(ds); };
            gm.appendChild(cell);

            db.ref('titoli/'+ds).on('value', s => document.getElementById('mt-'+ds).innerText = s.val() || "");
            db.ref('agenda/'+ds).on('value', s => {
                const b = document.getElementById('mb-'+ds); b.innerHTML = "";
                const val = s.val() || {};
                Object.values(val).forEach(v => { if(v.t) b.innerHTML += `<div style="background:${(colMap[v.c]||colMap.def)[0]}; color:white; font-size:7px; margin-top:1px; padding:2px; border-radius:2px">${v.h}</div>`; });
            });
        }
        
        const oggi = new Date().toISOString().split('T')[0];
        const giornoIniziale = (oggi.startsWith(mp.value)) ? oggi : `${y}-${String(m).padStart(2,'0')}-01`;
        selectDay(giornoIniziale);
        setTimeout(() => scrollToDay(giornoIniziale), 300);
    }

    function scrollToDay(id) {
        const el = document.getElementById("s-"+id);
        if(el) el.scrollIntoView({behavior: "smooth", block: "nearest", inline: "center"});
    }

    function selectDay(d) {
        currentDay = d;
        document.querySelectorAll('.day-item').forEach(x => x.classList.remove('active'));
        if(document.getElementById('s-'+d)) document.getElementById('s-'+d).classList.add('active');
        db.ref('titoli/'+d).once('value', s => document.getElementById('dayTitle').value = s.val() || "");
        db.ref('agenda/'+d).on('value', s => { localCache = s.val() || {}; renderAgenda(); });
    }

    function renderAgenda() {
        const grid = document.getElementById('grid');
        if (document.activeElement.tagName === 'TEXTAREA' || document.activeElement.tagName === 'INPUT') return;
        grid.innerHTML = "";
        
        let finale = {...localCache};
        if(document.getElementById('baseToggle').checked) {
            oreBase.forEach(o => { const id = "b_"+o.replace(":",""); if(!finale[id]) finale[id] = {h:o, t:"", c:"def"}; });
        }

        Object.keys(finale).sort((a,b) => finale[a].h.localeCompare(finale[b].h)).forEach(id => {
            const v = finale[id];
            if(!document.getElementById('baseToggle').checked && id.startsWith('b_') && !v.t) return;

            const c = colMap[v.c] || colMap.def;
            grid.innerHTML += `
            <div class="slot" style="border-left-color:${c[0]}">
                <div class="slot-main">
                    <input type="text" class="ora-input" value="${v.h}" onblur="salva('${id}', this.value, null)">
                    <textarea class="nota-input" onblur="salva('${id}', null, this.value)">${v.t}</textarea>
                </div>
                <div style="display:flex; justify-content:space-between; margin-top:8px;">
                    <div style="display:flex; gap:4px;">
                        ${Object.keys(colMap).filter(k=>k!='def').map(k => `<button onclick="colora('${id}','${k}')" style="width:28px; height:28px; border-radius:50%; border:none; color:white; background:${colMap[k][0]}">${colMap[k][1]}</button>`).join('')}
                    </div>
                    <button onclick="del('${id}')" style="background:none; border:none; font-size:20px;">🗑️</button>
                </div>
            </div>`;
        });
    }

    function salva(id, h, t) {
        const ref = db.ref(`agenda/${currentDay}/${id}`);
        ref.once('value', s => {
            const old = s.val() || {h:"", t:"", c:"def"};
            const nh = h !== null ? h : old.h;
            const nt = t !== null ? t : old.t;
            // Se c'è testo, salviamo SEMPRE l'orario per bloccare la posizione
            if(nt.trim() !== "" || !id.startsWith('b_')) ref.update({h: nh, t: nt, c: old.c || 'def'});
        });
    }

    function setSwitch(v) { localStorage.setItem('agendaOrari', v); renderAgenda(); }
    function colora(id, c) { db.ref(`agenda/${currentDay}/${id}`).update({c:c}); }
    function salvaTitolo(v) { db.ref('titoli/'+currentDay).set(v); }
    function del(id) { if(confirm("Elimina riga?")) db.ref(`agenda/${currentDay}/${id}`).remove(); }
    function pulisciTestiGiorno() { if(confirm("Resettare solo i testi di oggi?")) { Object.keys(localCache).forEach(id => db.ref(`agenda/${currentDay}/${id}`).update({t:""})); } }
    function resetInteroGiorno() { if(confirm("Cancellare tutto (titolo e righi) di oggi?")) { db.ref('agenda/'+currentDay).remove(); db.ref('titoli/'+currentDay).remove(); closeModal(); } }
    function svuotaGiorno(d) { if(confirm("Svuotare "+d+"?")) { db.ref('agenda/'+d).remove(); db.ref('titoli/'+d).remove(); } }
    
    function toggleVista(v) { document.getElementById('vistaGiorno').style.display = v==='giorno'?'block':'none'; document.getElementById('vistaMese').style.display = v==='mese'?'block':'none'; }
    function openModal() { document.getElementById('modalAdd').style.display='flex'; }
    function closeModal() { document.getElementById('modalAdd').style.display='none'; }
    function salvaModal() {
        const t = document.getElementById('mTesto').value;
        const h = document.getElementById('mInizio').value + "-" + document.getElementById('mFine').value;
        if(t) db.ref(`agenda/${currentDay}/c_${Date.now()}`).set({h:h, t:t, c:'def'}).then(() => { closeModal(); document.getElementById('mTesto').value=""; });
    }

    window.onload = initCalendar;
</script>
</body>
</html>
