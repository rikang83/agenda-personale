<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agenda 2026 - V2</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; padding: 10px;">
        <button class="header-btn" onclick="openModal('mainModal')">⚙️</button>
        
        <div id="notif-trigger" onclick="toggleNotifiche()" style="position: relative; cursor: pointer; font-size: 24px; height: 42px; width: 42px; display: flex; align-items: center; justify-content: center; background: #f0f0f0; border: 1px solid #ccc; border-radius: 8px;">
            🔔<span id="notif-badge" style="position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; display: none; border: 2px solid white;">0</span>
        </div>

        <select id="monthPicker" onchange="initCalendar()" style="height: 42px; border-radius: 8px; border: 1px solid #ccc; padding: 0 10px; font-weight: bold; background: white; min-width: 150px;"></select>
        
        <button class="header-btn" onclick="condividiWhatsApp()">➦</button>
    </div>

    <div class="nav-buttons" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 5px;">
        <button class="nav-btn" onclick="toggleVista('g')">GIORNO</button>
        <button class="nav-btn" onclick="toggleVista('m')">MESE</button>
        <button class="nav-btn" style="background:var(--a); border:none;" onclick="openRepModal()">RIPETI/PULISCI</button>
        
        <div class="master-switch">
            RIGHE <label class="switch"><input type="checkbox" id="checkRighe" checked onchange="salvaStatoRighe(this.checked)"><span class="slider"></span></label>
        </div>
        <div class="master-switch">
            ORA <label class="switch"><input type="checkbox" id="checkOrarioLabel" checked onchange="salvaStatoOra(this.checked)"><span class="slider"></span></label>
        </div>
        
        <button class="nav-btn" style="background:#673ab7; border:none;" onclick="openChartModal()">STATISTICHE</button>
    </div>
</div>

<div id="vGiorno">
    <div class="calendar-strip" id="strip"></div>
    <input type="text" id="titoloGiorno" class="day-title" placeholder="TITOLO GIORNATA" onblur="salvaTitolo(this.value)">
    <div id="listaImpegni" style="padding-bottom: 100px;"></div>
    <button class="fab-add" id="btnAddExtra" onclick="aggiungiRigaExtra()">+</button>
</div>

<div id="vMese" style="display:none;">
    <div class="grid-mese" id="corpoMeseHead">
        <div class="nome-giorno">LUN</div><div class="nome-giorno">MAR</div><div class="nome-giorno">MER</div><div class="nome-giorno">GIO</div><div class="nome-giorno">VEN</div><div class="nome-giorno">SAB</div><div class="nome-giorno">DOM</div>
    </div>
    <div id="corpoMese" class="grid-mese"></div>
</div>

<div id="mainModal" class="overlay" onclick="closeModal('mainModal')">
    <div class="modal-box" onclick="event.stopPropagation()">
        <h3 style="text-align:center;">Opzioni Giorno</h3>
        <button onclick="applicaSchemaMatrimonio()" class="btn-schema-wed">CARICA SCHEMA MATRIMONIO</button>
        <button onclick="applicaSchemaBattesimo()" class="btn-schema-bat" style="margin-top:10px;">CARICA SCHEMA BATTESIMO</button>
        <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
        <button onclick="pulisciTuttoGiorno(giornoCorrente)" class="btn-reset-day">RESET TOTALE OGGI</button>
        <button onclick="closeModal('mainModal')" class="btn-cancel">ANNULLA</button>
    </div>
</div>

<div id="repModal" class="overlay" onclick="closeModal('repModal')">
    <div class="modal-box" onclick="event.stopPropagation()">
        <h3 style="margin-top:0; text-align:center;">Gestione Impegni</h3>
        <input type="text" id="repTesto" placeholder="Cosa scrivere?" class="modal-input">
        <div style="display:flex; gap:10px; margin-top:10px;">
            <select id="repHInizio" class="modal-select"></select>
            <select id="repHFine" class="modal-select"></select>
        </div>
        <div class="modal-label">RIPETI NEI GIORNI:</div>
        <div class="dot-days-container">
            <div class="dot-day-rep" onclick="toggleRepDay(this, 1)">L</div>
            <div class="dot-day-rep" onclick="toggleRepDay(this, 2)">M</div>
            <div class="dot-day-rep" onclick="toggleRepDay(this, 3)">M</div>
            <div class="dot-day-rep" onclick="toggleRepDay(this, 4)">G</div>
            <div class="dot-day-rep" onclick="toggleRepDay(this, 5)">V</div>
            <div class="dot-day-rep" onclick="toggleRepDay(this, 6)">S</div>
            <div class="dot-day-rep" onclick="toggleRepDay(this, 0)">D</div>
        </div>
        <div class="modal-label">FINO AL GIORNO:</div>
        <input type="date" id="repDataFine" class="modal-input">
        <button onclick="eseguiRipetizione()" class="btn-apply-rep">APPLICA RIPETIZIONE</button>
        <button onclick="cancellaRipetizioniInBlocco()" class="btn-del-rep-block">CANCELLA IN BLOCCO (DA OGGI)</button>
    </div>
</div>

<div id="chartModal" class="overlay" onclick="closeModal('chartModal')">
    <div class="modal-box" style="max-width: 900px; width: 95%;" onclick="event.stopPropagation()">
        <h2 style="text-align: center; color: var(--p); margin-top:0;">Analisi Lavori 2026</h2>
        <div style="text-align: center; margin-bottom: 20px;">
            <small style="color: #666; display:block;">Totale Eventi Trovati</small>
            <span id="totalWorkCount" style="font-size: 28px; font-weight: 800; color: #4caf50;">0</span>
        </div>
        <div style="position: relative; height: 350px; width: 100%;">
            <canvas id="workChart"></canvas>
        </div>
        <div id="statsLegend" class="legend-grid" style="margin-top: 20px;"></div>
        <button onclick="closeModal('chartModal')" class="btn-close-chart">CHIUDI STATISTICHE</button>
    </div>
</div>

<div id="notifModal" class="overlay" onclick="closeModal('notifModal')">
    <div class="modal-box" style="max-width:400px;" onclick="event.stopPropagation()">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 style="margin:0;">Notifiche Attività</h3>
            <button onclick="closeModal('notifModal')" style="background:none; border:none; font-size:20px; cursor:pointer;">✕</button>
        </div>
        <div id="notif-list" style="max-height: 400px; overflow-y: auto;"></div>
        <button onclick="closeModal('notifModal')" style="margin-top:20px; width:100%; padding:15px; background:#666; color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">CHIUDI</button>
    </div>
</div>

<script src="script.js?v=1.5"></script>
</body>
</html>
