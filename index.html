<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agenda Pro 2026 - Versione Finale</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #f0f2f5; --p: #1a237e; --r: #2196f3; --a: #4caf50; --festivo: #d32f2f; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; }
        
        .header { background: var(--p); color: white; padding: 15px 10px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .nav-buttons { display: flex; justify-content: center; gap: 5px; margin-top: 10px; }
        .nav-btn { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; }
        #monthPicker { background: white; border: 2px solid var(--r); padding: 10px; border-radius: 8px; font-weight: bold; color: var(--p); font-size: 18px; width: 85%; }

        .calendar-strip { display: flex; overflow-x: auto; padding: 15px 10px; background: white; border-bottom: 1px solid #ddd; gap: 10px; }
        .day-item { min-width: 60px; height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; border: 1px solid #eee; cursor: pointer; flex-shrink: 0; background: #fff; }
        .day-item.holiday { background: var(--festivo); color: white; }
        .day-item.active { background: var(--r) !important; color: white !important; transform: scale(1.05); }

        .day-title-input { width: 95%; margin: 10px auto; display: block; border: 2px dashed #ccc; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; text-align: center; background: #fffbe6; }

        .content { padding: 10px; padding-bottom: 100px; }
        .slot { background: white; margin-bottom: 12px; padding: 12px; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); border-left: 10px solid #ddd; }
        .slot-main { display: flex; gap: 10px; }
        .ora-input { width: 85px; border: none; font-weight: bold; color: var(--p); background: #f0f4f8; padding: 10px; border-radius: 8px; text-align: center; }
        .nota-input { flex: 1; border: none; font-size: 16px; padding: 10px; background: #f8f9fa; border-radius: 8px; resize: none; min-height: 45px; }

        .actions { display: flex; justify-content: space-between; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        .dots { display: flex; gap: 8px; }
        .dot { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; font-weight: bold; }
        .btn-del { background: #fee2e2; color: #ef4444; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 18px; }

        /* VISTA MESE */
        #vistaMese { display: none; padding: 5px; }
        .grid-mese { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: #ccc; }
        .cell-mese { background: white; min-height: 120px; padding: 4px; cursor: pointer; position: relative; overflow: hidden; }
        .cell-mese b { font-size: 14px; }
        .btn-del-mese { position: absolute; top: 2px; right: 2px; background: #ffeded; border: none; color: red; border-radius: 4px; padding: 2px 5px; font-size: 10px; cursor: pointer; z-index: 5; }
        .mese-tag { color: white; padding: 2px; font-size: 9px; border-radius: 3px; margin-top: 1px; white-space: nowrap; overflow: hidden; }

        /* MODAL COMPLETO */
        #modalAdd { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 5000; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 25px; border-radius: 20px; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-block { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; margin-top: 10px; cursor: pointer; font-size: 16px; }

        .floating-tools { position: fixed; bottom: 25px; right: 25px; z-index: 4000; }
        .tool-btn { width: 65px; height: 65px; border-radius: 50%; border: none; color: white; font-size: 40px; background: var(--a); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="header">
    <select id="monthPicker" onchange="initCalendar()"></select>
    <div class="nav-buttons">
        <button class="nav-btn" onclick="switchView('giorno')">GIORNO</button>
        <button class="nav-btn" onclick="switchView('mese')">MESE</button>
        <button class="nav-btn" onclick="ripristinaBase()" style="background: var(--r);">ORE BASE</button>
    </div>
</div>

<div id="vistaGiorno">
    <div class="calendar-strip" id="calendarStrip"></div>
    <input type="text" id="dayTitleInput" class="day-title-input" placeholder="TITOLO GIORNATA" onblur="salvaTitolo(this.value)">
    <div class="content" id="gridOraria"></div>
</div>

<div id="vistaMese"><div class="grid-mese" id="gridMese"></div></div>

<div class="floating-tools"><button class="tool-btn" onclick="openModal()">+</button></div>

<div id="modalAdd">
    <div class="modal-content">
        <h3>Nuovo Appuntamento</h3>
        <div style="display:flex; gap:10px;">
            <div style="flex:1"><label>Inizio</label><input type="time" id="newOraInizio" value="09:00"></div>
            <div style="flex:1"><label>Fine</label><input type="time" id="newOraFine" value="10:00"></div>
        </div>
        <textarea id="newTesto" rows="3" placeholder="Note / Nome..."></textarea>
        <button class="btn-block" style="background:var(--a); color:white" onclick="salvaDalModal()">SALVA</button>
        <button class="btn-block" style="background:#f44336; color:white" onclick="resetOrari()">CANCELLA TUTTO IL GIORNO</button>
        <button class="btn-block" style="background:#eee" onclick="closeModal()">CHIUDI</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        databaseURL: "https://agenda-2026-eceb7-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "agenda-2026-eceb7",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let selectedDate = "";
    const oreBase = ["09:00","09:30","10:00","10:30","11:00","11:30","12:00","12:30","13:00","16:30","17:00","17:30","18:00","18:30","19:00","19:30","20:00"];
    const colMap = { ric:['#2196f3','R'], a:['#4caf50','A'], d:['#ff9800','D'], v:['#fbc02d','V','#333'], def:['#ddd',''] };

    function initCalendar() {
        const mp = document.getElementById('monthPicker');
        if(mp.options.length === 0) {
            ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"].forEach((m, i) => {
                let opt = new Option(m + " 2026", `2026-${String(i+1).padStart(2,'0')}`);
                if(i === new Date().getMonth()) opt.selected = true;
                mp.add(opt);
            });
        }
        const [y, m] = mp.value.split('-').map(Number);
        const strip = document.getElementById('calendarStrip'); strip.innerHTML = "";
        for (let i = 1; i <= new Date(y, m, 0).getDate(); i++) {
            const ds = `${y}-${String(m).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const el = document.createElement('div'); el.className = `day-item ${new Date(ds).getDay()===0?'holiday':''}`; el.id = "day-"+ds;
            el.innerHTML = `<span>${["Dom","Lun","Mar","Mer","Gio","Ven","Sab"][new Date(ds).getDay()]}</span><b>${i}</b>`;
            el.onclick = () => selectDay(ds);
            strip.appendChild(el);
        }
        selectDay(selectedDate || `${y}-${String(m).padStart(2,'0')}-01`);
        renderMese(y, m);
    }

    function selectDay(dStr) {
        selectedDate = dStr;
        document.querySelectorAll('.day-item').forEach(d => d.classList.remove('active'));
        if(document.getElementById("day-"+dStr)) document.getElementById("day-"+dStr).classList.add('active');

        db.ref('titoli/' + dStr).once('value', s => { document.getElementById('dayTitleInput').value = s.val() || ""; });

        db.ref('agenda/' + dStr).on('value', snap => {
            if (document.activeElement.tagName === 'TEXTAREA' || document.activeElement.tagName === 'INPUT') return;
            const dati = snap.val() || {};
            const grid = document.getElementById('gridOraria');
            grid.innerHTML = "";
            
            let mappa = {};
            oreBase.forEach(o => { let id = "b_"+o.replace(":",""); mappa[id] = {h:o, t:"", c:"def", id:id}; });
            Object.keys(dati).forEach(k => { if(dati[k].h) mappa[k] = {...dati[k], id:k}; });

            Object.values(mappa).sort((a,b)=>a.h.localeCompare(b.h)).forEach(v => {
                const c = colMap[v.c] || colMap.def;
                grid.innerHTML += `
                <div class="slot" style="border-left-color:${c[0]}">
                    <div class="slot-main">
                        <input type="text" class="ora-input" value="${v.h}" onblur="salvaDato('${v.id}', this.value, null)">
                        <textarea class="nota-input" onblur="salvaDato('${v.id}', null, this.value)">${v.t}</textarea>
                    </div>
                    <div class="actions">
                        <div class="dots">
                            ${Object.entries(colMap).filter(x=>x[0]!='def').map(([k,val])=>`
                                <div class="dot" style="background:${val[0]}" onclick="cambiaColore('${v.id}','${k}')">${val[1]}</div>
                            `).join('')}
                        </div>
                        <button class="btn-del" onclick="elimina('${v.id}')">🗑️</button>
                    </div>
                </div>`;
            });
        });
    }

    function salvaDato(id, ora, testo) {
        const ref = db.ref('agenda/' + selectedDate + '/' + id);
        ref.once('value').then(s => {
            const d = s.val() || { h: "", t: "", c: "def" };
            ref.update({ h: ora !== null ? ora : d.h, t: testo !== null ? testo : d.t, c: d.c });
        });
    }

    function cambiaColore(id, col) { db.ref('agenda/' + selectedDate + '/' + id).update({ c: col }); }
    function salvaTitolo(v) { db.ref('titoli/' + selectedDate).set(v); }

    function renderMese(y, m) {
        const gm = document.getElementById('gridMese'); gm.innerHTML = "";
        for (let i = 1; i <= new Date(y, m, 0).getDate(); i++) {
            const ds = `${y}-${String(m).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const cell = document.createElement('div'); cell.className = 'cell-mese';
            cell.innerHTML = `<b>${i}</b><button class="btn-del-mese" onclick="event.stopPropagation(); resetOrariSpecifico('${ds}')">🗑️</button><div id="tm-${ds}"></div><div id="am-${ds}"></div>`;
            cell.onclick = () => { switchView('giorno'); selectDay(ds); };
            gm.appendChild(cell);
            db.ref('titoli/'+ds).on('value', s => { if(document.getElementById("tm-"+ds)) document.getElementById("tm-"+ds).innerHTML = s.val() ? `<div style="font-size:8px; background:#fffbe6; padding:1px;">${s.val()}</div>` : ""; });
            db.ref('agenda/'+ds).on('value', s => {
                const div = document.getElementById("am-"+ds); if(!div) return; div.innerHTML = "";
                const d = s.val() || {};
                Object.values(d).filter(x=>x.t).forEach(x => {
                    div.innerHTML += `<div class="mese-tag" style="background:${colMap[x.c][0]}">${x.h} ${x.t.substring(0,8)}</div>`;
                });
            });
        }
    }

    function switchView(v) { document.getElementById('vistaGiorno').style.display = v==='giorno'?'block':'none'; document.getElementById('vistaMese').style.display = v==='mese'?'block':'none'; }
    function openModal() { document.getElementById('modalAdd').style.display='flex'; }
    function closeModal() { document.getElementById('modalAdd').style.display='none'; }

    function salvaDalModal() {
        const h1 = document.getElementById('newOraInizio').value;
        const h2 = document.getElementById('newOraFine').value;
        const t = document.getElementById('newTesto').value;
        const id = "c_" + Date.now();
        db.ref('agenda/'+selectedDate+'/'+id).set({ h: h1 + "-" + h2, t: t, c: 'def' }).then(closeModal);
    }

    function elimina(id) { if(confirm("Eliminare?")) db.ref('agenda/'+selectedDate+'/'+id).remove(); }
    function resetOrari() { if(confirm("Cancellare tutto il giorno?")) { db.ref('agenda/'+selectedDate).remove(); db.ref('titoli/'+selectedDate).remove(); closeModal(); } }
    function resetOrariSpecifico(ds) { if(confirm("Cancellare dati del " + ds + "?")) { db.ref('agenda/'+ds).remove(); db.ref('titoli/'+ds).remove(); } }
    function ripristinaBase() { 
        if(confirm("Ripristinare orari base?")) {
            const obj = {}; oreBase.forEach(o => { let id = "b_"+o.replace(":",""); obj[id] = {h:o, t:"", c:"def"}; });
            db.ref('agenda/'+selectedDate).set(obj);
        }
    }
    window.onload = initCalendar;
</script>
</body>
</html>
