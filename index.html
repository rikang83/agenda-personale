<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agenda Pro 2026</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #f0f2f5; --p: #1a237e; --r: #2196f3; --a: #4caf50; --d: #ff9800; --v: #ffeb3b; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; }
        
        .header { background: var(--p); color: white; padding: 15px 10px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .nav-buttons { display: flex; justify-content: center; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
        .nav-btn { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; }
        
        #monthPicker { background: white; border: 2px solid var(--r); padding: 10px; border-radius: 8px; font-weight: bold; color: var(--p); font-size: 18px; width: 85%; }

        .calendar-strip { display: flex; overflow-x: auto; padding: 12px; background: white; border-bottom: 1px solid #ddd; gap: 10px; }
        .day-item { min-width: 55px; height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; border: 1px solid #eee; cursor: pointer; flex-shrink: 0; background: #fff; }
        .day-item.active { background: var(--r) !important; color: white !important; }
        
        .content { padding: 10px; padding-bottom: 100px; }
        .slot { background: white; margin-bottom: 12px; padding: 12px; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); border-left: 10px solid #ddd; }
        .slot-main { display: flex; gap: 10px; }
        .ora-input { width: 100px; border: none; font-weight: bold; color: var(--p); background: #f0f4f8; padding: 8px; border-radius: 6px; text-align: center; }
        .nota-input { flex: 1; border: none; font-size: 16px; padding: 10px; background: #f8f9fa; border-radius: 8px; resize: none; }

        /* TONDINI FIX */
        .actions { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        .dots { display: flex; gap: 8px; }
        .dot { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; font-weight: bold; cursor: pointer; border: none; }

        /* MODALE */
        #modalAdd { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 5000; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 20px; }
        .modal-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn-action { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }

        #vistaMese { display: none; padding: 8px; }
        .grid-mese { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; background: #ddd; }
        .cell-mese { background: white; min-height: 100px; padding: 5px; position: relative; cursor: pointer; }

        .floating-tools { position: fixed; bottom: 20px; right: 20px; z-index: 4000; }
        .tool-btn { width: 60px; height: 60px; border-radius: 50%; border: none; color: white; font-size: 35px; background: var(--a); }
    </style>
</head>
<body>

<div id="modalAdd">
    <div class="modal-content">
        <h3 style="margin-top:0">Gestione Appuntamenti</h3>
        <div style="margin-bottom:10px">
            <label>Orario (Inizio - Fine):</label><br>
            <input type="time" id="newOraInizio" value="09:00"> a <input type="time" id="newOraFine" value="10:00">
        </div>
        <div style="margin-bottom:10px">
            <label>Testo da cercare/inserire:</label><br>
            <textarea id="newTesto" rows="2" style="width:100%"></textarea>
        </div>
        <div class="modal-btns">
            <button class="btn-action" style="background:var(--a); color:white" onclick="salvaDalModal('add')">INSERISCI (OGNI SETTIMANA)</button>
            <button class="btn-action" style="background:var(--r); color:white" onclick="salvaDalModal('single')">INSERISCI (SOLO OGGI)</button>
            <button class="btn-action" style="background:#f44336; color:white" onclick="cancellaInBlocco()">CANCELLA QUESTA NOTA IN TUTTO IL 2026</button>
            <button class="btn-action" style="background:#999; color:white" onclick="closeModal()">CHIUDI</button>
        </div>
    </div>
</div>

<div class="header">
    <select id="monthPicker" onchange="initCalendar()"></select>
    <div class="nav-buttons">
        <button class="nav-btn" onclick="switchView('giorno')">GIORNO</button>
        <button class="nav-btn" onclick="switchView('mese')">MESE</button>
        <button class="nav-btn" onclick="ripristinaBase()" style="background: var(--r);">ORE BASE</button>
        <button class="nav-btn" onclick="resetOrari()" style="background: #f44336;">RESET GIORNO</button>
    </div>
</div>

<div id="vistaGiorno">
    <div class="calendar-strip" id="calendarStrip"></div>
    <div class="content" id="gridOraria"></div>
</div>

<div id="vistaMese"><div class="grid-mese" id="gridMese"></div></div>

<div class="floating-tools">
    <button class="tool-btn" onclick="openModal()">+</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        databaseURL: "https://agenda-2026-eceb7-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "agenda-2026-eceb7",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let selectedDate = "";
    const oreBase = ["09:00","09:30","10:00","10:30","11:00","11:30","12:00","12:30","13:00","16:30","17:00","17:30","18:00","18:30","19:00","19:30","20:00"];
    const colMap = { ric:['#2196f3','R'], a:['#4caf50','A'], d:['#ff9800','D'], v:['#ffeb3b','V','#333'], def:['#ddd',''] };

    function initCalendar() {
        const mp = document.getElementById('monthPicker');
        if(mp.options.length === 0) {
            const mNames = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
            for(let i=0; i<12; i++) {
                let opt = new Option(mNames[i] + " 2026", `2026-${String(i+1).padStart(2,'0')}`);
                if(i === new Date().getMonth()) opt.selected = true;
                mp.add(opt);
            }
        }
        const [y, m] = mp.value.split('-').map(Number);
        const strip = document.getElementById('calendarStrip'); strip.innerHTML = "";
        for (let i = 1; i <= new Date(y, m, 0).getDate(); i++) {
            const ds = `${y}-${String(m).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const el = document.createElement('div'); el.className = 'day-item'; el.id = "day-"+ds;
            el.innerHTML = `<b>${i}</b>`;
            el.onclick = () => selectDay(ds, false);
            strip.appendChild(el);
        }
        selectDay(selectedDate || `${y}-${String(m).padStart(2,'0')}-${String(new Date().getDate()).padStart(2,'0')}`, false);
        renderMese(y, m);
    }

    function selectDay(dStr, doScroll) {
        selectedDate = dStr;
        document.querySelectorAll('.day-item').forEach(d => d.classList.remove('active'));
        if(document.getElementById("day-"+dStr)) document.getElementById("day-"+dStr).classList.add('active');
        
        db.ref('agenda/' + dStr).on('value', snap => {
            const dati = snap.val() || {};
            const grid = document.getElementById('gridOraria'); grid.innerHTML = "";
            let mappa = {};
            oreBase.forEach(o => mappa[o] = {h:o, t:"", c:"def", id:"base_"+o.replace(/:/g,"_")});
            Object.keys(dati).forEach(k => { mappa[dati[k].h || k] = {...dati[k], id: k}; });

            Object.values(mappa).sort((a,b)=>String(a.h).localeCompare(String(b.h))).forEach(v => {
                const c = colMap[v.c] || colMap.def;
                grid.innerHTML += `
                <div class="slot" id="slot-${v.id}" style="border-left-color:${c[0]}">
                    <div class="slot-main">
                        <input type="text" class="ora-input" value="${v.h}" onblur="salva('${v.id}',this.value,null,null)">
                        <textarea class="nota-input" onblur="salva('${v.id}',null,this.value,null)">${v.t}</textarea>
                    </div>
                    <div class="actions">
                        <div class="dots">
                            ${Object.entries(colMap).filter(x=>x[0]!='def').map(([k,val])=>`
                                <div class="dot" style="background:${val[0]};color:${val[2]||'white'}" onclick="salva('${v.id}',null,null,'${k}')">${val[1]}</div>
                            `).join('')}
                            <div class="dot" style="background:#eee;color:#999" onclick="elimina('${v.id}')">×</div>
                        </div>
                    </div>
                </div>`;
            });
            if(doScroll) window.scrollTo({top: 200, behavior:'smooth'});
        });
    }

    function salva(id, ora, testo, colore) {
        const ref = db.ref('agenda/'+selectedDate+'/'+id);
        ref.once('value').then(s => {
            const d = s.val() || {};
            ref.update({
                h: ora !== null ? ora : (d.h || ""),
                t: testo !== null ? testo : (d.t || ""),
                c: colore !== null ? colore : (d.c || "def")
            });
        });
    }

    function ripristinaBase() {
        if(confirm("Sostituire tutto con orari base 09-20?")) {
            const obj = {};
            oreBase.forEach(o => { obj["base_"+o.replace(/:/g,"_")] = {h:o, t:"", c:"def"}; });
            db.ref('agenda/'+selectedDate).set(obj);
        }
    }

    function salvaDalModal(tipo) {
        const h = document.getElementById('newOraInizio').value + " - " + document.getElementById('newOraFine').value;
        const t = document.getElementById('newTesto').value;
        const id = "ex_" + Date.now();
        if(tipo === 'single') {
            db.ref('agenda/'+selectedDate+'/'+id).set({h:h, t:t, c:'def'});
        } else {
            const dOW = new Date(selectedDate).getDay();
            for(let m=0; m<12; m++) {
                let lastD = new Date(2026, m+1, 0).getDate();
                for(let d=1; d<=lastD; d++) {
                    let dIt = new Date(2026, m, d);
                    if(dIt.getDay() === dOW) {
                        db.ref('agenda/2026-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0')+'/'+id).set({h:h, t:t, c:'def'});
                    }
                }
            }
        }
        closeModal();
    }

    function cancellaInBlocco() {
        const testo = document.getElementById('newTesto').value;
        if(!testo || testo.length < 3) return alert("Scrivi almeno 3 lettere della nota da cancellare");
        if(confirm("Vuoi cancellare '"+testo+"' da tutti i giorni del 2026?")) {
            db.ref('agenda').once('value', snap => {
                const tutti = snap.val();
                Object.keys(tutti).forEach(giorno => {
                    Object.keys(tutti[giorno]).forEach(id => {
                        if(tutti[giorno][id].t && tutti[giorno][id].t.includes(testo)) {
                            db.ref('agenda/'+giorno+'/'+id).remove();
                        }
                    });
                });
                alert("Cancellazione completata.");
                closeModal();
            });
        }
    }

    function openModal() { document.getElementById('modalAdd').style.display='flex'; }
    function closeModal() { document.getElementById('modalAdd').style.display='none'; }
    function elimina(id) { db.ref('agenda/'+selectedDate+'/'+id).remove(); }
    function resetOrari() { if(confirm("Svuotare oggi?")) db.ref('agenda/'+selectedDate).remove(); }
    function switchView(v) { 
        document.getElementById('vistaGiorno').style.display = v==='giorno'?'block':'none';
        document.getElementById('vistaMese').style.display = v==='mese'?'block':'none';
    }

    function renderMese(y, m) {
        const gm = document.getElementById('gridMese'); gm.innerHTML = "";
        for (let i = 1; i <= new Date(y, m, 0).getDate(); i++) {
            const ds = `${y}-${String(m).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const cell = document.createElement('div'); cell.className = "cell-mese";
            cell.innerHTML = `<b>${i}</b><div id="m-${ds}" style="font-size:8px"></div>`;
            cell.onclick = () => { switchView('giorno'); selectDay(ds, true); };
            gm.appendChild(cell);
            db.ref('agenda/'+ds).on('value', s => {
                const d = s.val() || {};
                const div = document.getElementById("m-"+ds); if(!div) return;
                div.innerHTML = Object.values(d).filter(x=>x.t).map(x=>`<div style="background:${colMap[x.c][0]};color:white;margin-top:1px">${x.t.substring(0,5)}</div>`).join('');
            });
        }
    }
    window.onload = initCalendar;
</script>
</body>
</html>
